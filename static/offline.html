<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SweetBites - Offline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* Base styles */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to bottom, #FCE7F3, #FFFFFF);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #1F2937;
    }
    
    .container {
      width: 90%;
      max-width: 500px;
      text-align: center;
      padding: 2rem;
      background-color: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      border-radius: 1.5rem;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
    }
    
    .logo {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 2.5rem;
      color: #F43F5E;
      margin-bottom: 1.5rem;
    }
    
    .offline-icon {
      width: 80px;
      height: 80px;
      margin-bottom: 1.5rem;
    }
    
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      margin: 0 0 1rem 0;
    }
    
    p {
      color: #4B5563;
      margin-bottom: 2rem;
      line-height: 1.5;
    }
    
    .button {
      background-color: #F43F5E;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 500;
      border-radius: 2rem;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px rgba(244, 63, 94, 0.2);
    }
    
    .button:hover {
      background-color: #E11D48;
      transform: translateY(-2px);
      box-shadow: 0 6px 10px rgba(244, 63, 94, 0.3);
    }
    
    .button:active {
      transform: translateY(0);
    }
    
    /* Background shapes */
    .shapes {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: -1;
      pointer-events: none;
    }
    
    .shape {
      position: absolute;
      background-color: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
    }
    
    .shape-1 {
      width: 120px;
      height: 120px;
      top: 15%;
      left: 10%;
      animation: float-1 12s infinite ease-in-out;
    }
    
    .shape-2 {
      width: 160px;
      height: 160px;
      bottom: 20%;
      left: 20%;
      animation: float-2 15s infinite ease-in-out;
    }
    
    .shape-3 {
      width: 200px;
      height: 200px;
      top: 20%;
      right: 15%;
      animation: float-3 10s infinite ease-in-out;
    }
    
    .shape-4 {
      width: 140px;
      height: 140px;
      bottom: 10%;
      right: 10%;
      animation: float-4 13s infinite ease-in-out;
    }
    
    @keyframes float-1 {
      0%, 100% { transform: translate(0, 0) rotate(0); }
      50% { transform: translate(-20px, -20px) rotate(5deg); }
    }
    @keyframes float-2 {
      0%, 100% { transform: translate(0, 0) rotate(0); }
      50% { transform: translate(30px, -15px) rotate(-8deg); }
    }
    @keyframes float-3 {
      0%, 100% { transform: translate(0, 0) rotate(0); }
      50% { transform: translate(-25px, 10px) rotate(-10deg); }
    }
    @keyframes float-4 {
      0%, 100% { transform: translate(0, 0) rotate(0); }
      50% { transform: translate(15px, 20px) rotate(15deg); }
    }
    
    /* Responsive adjustments */
    @media (max-width: 640px) {
      .container {
        width: 85%;
        padding: 1.5rem;
      }
      
      .logo {
        font-size: 2rem;
      }
      
      h1 {
        font-size: 1.5rem;
      }
      
      .offline-icon {
        width: 60px;
        height: 60px;
      }
    }
  </style>
</head>
<body>
  <div class="shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
    <div class="shape shape-4"></div>
  </div>

  <div class="container">
    <div class="logo">SweetBites</div>
    
    <svg class="offline-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#F43F5E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"></line>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
      <path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
      <line x1="12" y1="20" x2="12.01" y2="20"></line>
    </svg>
    
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Don't worry - some SweetBites content has been cached for offline use.</p>
    <button class="button" onclick="window.location.reload()">Try Again</button>
  </div>

  <script>
    // Check if we're back online and automatically reload
    window.addEventListener('online', () => {
      window.location.reload();
    });
    
    // Register the service worker if it hasn't been registered yet
    if ('serviceWorker' in navigator && !navigator.serviceWorker.controller) {
      navigator.serviceWorker.register('/service-worker.js');
    }
  </script>
</body>
</html>
